<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dbbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFEDE6"/>
      <stop offset="100%" stop-color="#D9D6CB"/>
    </linearGradient>
    <linearGradient id="laptopGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16231F"/>
      <stop offset="100%" stop-color="#2B3F38"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#dbbg)"/>

  <!-- grid background details -->
  <g opacity="0.3" stroke="#B9B6AC" stroke-width="2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
  </g>

  <!-- Laptop illustration -->
  <g transform="translate(75, 75)">
    <!-- Laptop screen outer shadow -->
    <rect x="5" y="10" width="340" height="215" rx="14" fill="#16231F" opacity="0.12"/>
    
    <!-- Laptop Screen Case -->
    <rect width="350" height="225" rx="14" fill="url(#laptopGrad)"/>
    <!-- Web Camera -->
    <circle cx="175" cy="8" r="3" fill="#DEF2E4" opacity="0.5"/>
    
    <!-- Laptop Screen display area -->
    <rect x="12" y="18" width="326" height="194" rx="6" fill="#ffffff"/>

    <!-- Dashboard Content inside screen -->
    <g transform="translate(20, 26)">
      <!-- Sidebar navigation -->
      <rect x="0" y="0" width="60" height="178" rx="4" fill="#DEF2E4" opacity="0.4"/>
      <rect x="8" y="15" width="44" height="8" rx="2" fill="#1E8E5A"/>
      <rect x="8" y="35" width="44" height="6" rx="2" fill="#16231F" opacity="0.6"/>
      <rect x="8" y="50" width="44" height="6" rx="2" fill="#16231F" opacity="0.6"/>
      <rect x="8" y="65" width="44" height="6" rx="2" fill="#16231F" opacity="0.6"/>
      
      <!-- Main Content Area -->
      <!-- Title -->
      <rect x="75" y="0" width="110" height="12" rx="3" fill="#16231F"/>
      
      <!-- Stats Cards -->
      <g transform="translate(75, 22)">
        <!-- Card 1 (Users) -->
        <rect x="0" y="0" width="65" height="40" rx="6" fill="#F1EDE2"/>
        <rect x="8" y="8" width="35" height="5" rx="1.5" fill="#1E8E5A" opacity="0.5"/>
        <text x="8" y="28" font-family="Arial" font-size="14" font-weight="bold" fill="#1E8E5A">1,240</text>
        
        <!-- Card 2 (Workouts) -->
        <rect x="75" y="0" width="65" height="40" rx="6" fill="#F1EDE2"/>
        <rect x="83" y="8" width="40" height="5" rx="1.5" fill="#E3A83B" opacity="0.5"/>
        <text x="83" y="28" font-family="Arial" font-size="14" font-weight="bold" fill="#E3A83B">8.4k</text>

        <!-- Card 3 (Server status) -->
        <rect x="150" y="0" width="65" height="40" rx="6" fill="#F1EDE2"/>
        <rect x="158" y="8" width="30" height="5" rx="1.5" fill="#16231F" opacity="0.4"/>
        <text x="158" y="28" font-family="Arial" font-size="13" font-weight="bold" fill="#16231F">Active</text>
      </g>

      <!-- Charts / Table below Cards -->
      <g transform="translate(75, 75)">
        <!-- Bar Chart box -->
        <rect x="0" y="0" width="125" height="90" rx="6" fill="#f9f9f9" stroke="#B9B6AC" stroke-width="1"/>
        <text x="10" y="15" font-family="Arial" font-size="8" font-weight="bold" fill="#16231F">Usage Analytics</text>
        
        <!-- Bar Chart lines -->
        <rect x="15" y="60" width="10" height="20" rx="2" fill="#1E8E5A"/>
        <rect x="35" y="45" width="10" height="35" rx="2" fill="#1E8E5A"/>
        <rect x="55" y="30" width="10" height="50" rx="2" fill="#E3A83B"/>
        <rect x="75" y="50" width="10" height="30" rx="2" fill="#1E8E5A"/>
        <rect x="95" y="20" width="10" height="60" rx="2" fill="#1E8E5A"/>

        <!-- User Table box -->
        <rect x="135" y="0" width="80" height="90" rx="6" fill="#f9f9f9" stroke="#B9B6AC" stroke-width="1"/>
        <text x="142" y="15" font-family="Arial" font-size="8" font-weight="bold" fill="#16231F">Admin Control</text>
        <!-- Table rows simulation -->
        <line x1="142" y1="28" x2="208" y2="28" stroke="#B9B6AC" stroke-width="1"/>
        <rect x="142" y="35" width="40" height="5" rx="1.5" fill="#16231F" opacity="0.5"/>
        <rect x="142" y="48" width="50" height="5" rx="1.5" fill="#16231F" opacity="0.5"/>
        <rect x="142" y="61" width="30" height="5" rx="1.5" fill="#16231F" opacity="0.5"/>
        <rect x="142" y="74" width="45" height="5" rx="1.5" fill="#1E8E5A" opacity="0.8"/>
      </g>
    </g>

    <!-- Laptop Base Keyboard segment -->
    <path d="M-40 224 L390 224 L370 236 L-20 236 Z" fill="#2B3F38" stroke="#16231F" stroke-width="1"/>
    <!-- Trackpad accent -->
    <rect x="145" y="226" width="60" height="8" rx="2" fill="#16231F" opacity="0.5"/>
  </g>
</svg>
