<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nlbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DEF2E4"/>
      <stop offset="100%" stop-color="#D9D6CB"/>
    </linearGradient>
    <linearGradient id="envGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16231F"/>
      <stop offset="100%" stop-color="#2B3F38"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#nlbg)"/>

  <!-- grid background details -->
  <g opacity="0.3" stroke="#BEE6CC" stroke-width="2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
  </g>

  <!-- Sparkles -->
  <g transform="translate(390, 80)" fill="#E3A83B">
    <path d="M0 -15 L3 -4 L14 -4 L5 3 L8 14 L0 7 L-8 14 L-5 3 L-14 -4 L-3 -4 Z" transform="scale(0.8)"/>
  </g>
  <g transform="translate(100, 100)" fill="#E3A83B">
    <path d="M0 -15 L3 -4 L14 -4 L5 3 L8 14 L0 7 L-8 14 L-5 3 L-14 -4 L-3 -4 Z" transform="scale(0.5)"/>
  </g>

  <!-- Mail Envelope illustration -->
  <g transform="translate(125, 90)">
    <!-- Shadow -->
    <rect x="10" y="40" width="230" height="170" rx="10" fill="#16231F" opacity="0.12"/>

    <!-- Document popping out of the envelope -->
    <g transform="translate(30, 0)">
      <rect width="190" height="150" rx="8" fill="#ffffff" stroke="#B9B6AC" stroke-width="2"/>
      <!-- Header lines on document -->
      <rect x="15" y="20" width="60" height="8" rx="2" fill="#1E8E5A"/>
      <rect x="15" y="35" width="100" height="5" rx="1.5" fill="#16231F" opacity="0.5"/>
      <rect x="15" y="45" width="120" height="5" rx="1.5" fill="#16231F" opacity="0.5"/>
      
      <!-- Mini Chart -->
      <path d="M 15,110 L 55,90 L 95,120 L 135,70" fill="none" stroke="#1E8E5A" stroke-width="4" stroke-linecap="round"/>
      <circle cx="15" cy="110" r="4" fill="#E3A83B"/>
      <circle cx="55" cy="90" r="4" fill="#E3A83B"/>
      <circle cx="95" cy="120" r="4" fill="#E3A83B"/>
      <circle cx="135" cy="70" r="5" fill="#16231F"/>
    </g>

    <!-- Envelope Back Plate -->
    <rect y="70" width="250" height="140" rx="6" fill="url(#envGrad)"/>
    <!-- Envelope Flap (Open) -->
    <path d="M0 70 L125 15 L250 70 Z" fill="#2B3F38" stroke="#16231F" stroke-width="1"/>
    <!-- Envelope Front flaps (V shape overlay when closed/back details) -->
    <path d="M0 210 L125 125 L250 210 Z" fill="#1E8E5A" opacity="0.1"/>
    <path d="M0 70 L125 140 L250 70" fill="none" stroke="#16231F" stroke-width="2"/>
  </g>
</svg>
