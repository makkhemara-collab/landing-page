<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFEDE6"/>
      <stop offset="100%" stop-color="#D9D6CB"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16231F"/>
      <stop offset="100%" stop-color="#2B3F38"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#lbg)"/>
  
  <!-- background accent glow -->
  <circle cx="100" cy="120" r="80" fill="#1E8E5A" opacity="0.08"/>
  <circle cx="420" cy="280" r="100" fill="#E3A83B" opacity="0.08"/>

  <!-- grid background details -->
  <g opacity="0.3" stroke="#B9B6AC" stroke-width="2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="0" y1="320" x2="500" y2="320"/>
  </g>

  <!-- Kettlebell/Dumbbell illustration on the left -->
  <g transform="translate(110, 220)">
    <!-- Shadow -->
    <ellipse cx="0" cy="65" rx="55" ry="12" fill="#16231F" opacity="0.15"/>
    <!-- Handle -->
    <path d="M-30 0 Q-30 -45 0 -45 Q30 -45 30 0 Z" fill="none" stroke="#2B3F38" stroke-width="16"/>
    <!-- Bell Body -->
    <circle cx="0" cy="20" r="50" fill="url(#phoneGrad)"/>
    <circle cx="0" cy="20" r="40" fill="#1E8E5A" opacity="0.95"/>
    <!-- Text on Kettlebell -->
    <text x="0" y="28" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">16KG</text>
  </g>

  <!-- Smartphone illustration on the right -->
  <g transform="translate(290, 60)">
    <!-- Phone Shadow -->
    <rect x="5" y="10" width="145" height="280" rx="20" fill="#16231F" opacity="0.15"/>
    <!-- Phone Body -->
    <rect width="145" height="280" rx="20" fill="url(#phoneGrad)"/>
    <!-- Phone Screen -->
    <rect x="6" y="12" width="133" height="240" rx="14" fill="#ffffff"/>
    
    <!-- Screen Header -->
    <rect x="15" y="25" width="55" height="10" rx="3" fill="#1E8E5A" opacity="0.2"/>
    <circle cx="115" cy="30" r="6" fill="#E3A83B"/>
    
    <!-- Workout Items List -->
    <g transform="translate(15, 55)">
      <!-- Item 1 -->
      <rect x="0" y="0" width="103" height="40" rx="8" fill="#F1EDE2"/>
      <rect x="8" y="10" width="55" height="8" rx="2" fill="#16231F"/>
      <rect x="8" y="22" width="35" height="6" rx="2" fill="#1E8E5A"/>
      <circle cx="88" cy="20" r="8" fill="#1E8E5A"/>
      <path d="M85 20 L87 22 L91 18" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Item 2 -->
      <rect x="0" y="50" width="103" height="40" rx="8" fill="#F1EDE2"/>
      <rect x="8" y="60" width="45" height="8" rx="2" fill="#16231F"/>
      <rect x="8" y="72" width="30" height="6" rx="2" fill="#1E8E5A"/>
      <circle cx="88" cy="70" r="8" fill="#1E8E5A"/>
      <path d="M85 70 L87 72 L91 68" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- Item 3 -->
      <rect x="0" y="100" width="103" height="40" rx="8" fill="#F1EDE2"/>
      <rect x="8" y="110" width="50" height="8" rx="2" fill="#16231F"/>
      <rect x="8" y="122" width="35" height="6" rx="2" fill="#1E8E5A"/>
      <circle cx="88" cy="120" r="8" fill="#E3A83B" opacity="0.5"/>
    </g>

    <!-- Phone Speaker/Camera bar -->
    <rect x="42" y="4" width="60" height="4" rx="2" fill="#2B3F38"/>
  </g>
</svg>
