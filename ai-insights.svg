<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E2EAF1"/>
      <stop offset="100%" stop-color="#F1EDE2"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#EFEDE6"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" fill="url(#abg)"/>

  <!-- grid background details -->
  <g opacity="0.3" stroke="#B9B6AC" stroke-width="2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="0" y1="320" x2="500" y2="320"/>
  </g>

  <!-- Sparkles / Stars -->
  <g transform="translate(370, 70)" fill="#E3A83B">
    <path d="M0 -15 L3 -4 L14 -4 L5 3 L8 14 L0 7 L-8 14 L-5 3 L-14 -4 L-3 -4 Z" transform="scale(0.8)"/>
  </g>
  <g transform="translate(110, 50)" fill="#E3A83B" opacity="0.6">
    <path d="M0 -15 L3 -4 L14 -4 L5 3 L8 14 L0 7 L-8 14 L-5 3 L-14 -4 L-3 -4 Z" transform="scale(0.5)"/>
  </g>
  <g transform="translate(70, 150)" fill="#E3A83B">
    <path d="M0 -15 L3 -4 L14 -4 L5 3 L8 14 L0 7 L-8 14 L-5 3 L-14 -4 L-3 -4 Z" transform="scale(0.6)"/>
  </g>

  <!-- Floating Gear / AI Brain icon in the background -->
  <g transform="translate(330, 240)">
    <circle cx="0" cy="0" r="85" fill="#1E8E5A" opacity="0.08"/>
    <!-- Outer Gear wheels -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#1E8E5A" stroke-width="12" stroke-dasharray="24 12" opacity="0.8"/>
    <!-- Inner Core -->
    <circle cx="0" cy="0" r="30" fill="#1E8E5A" opacity="0.9"/>
    <!-- Sparkle inside gear -->
    <path d="M0 -10 L2 -3 L9 -3 L3 2 L5 9 L0 5 L-5 9 L-3 2 L-9 -3 L-2 -3 Z" fill="#ffffff" transform="scale(0.7)"/>
  </g>

  <!-- AI Feedback card in the foreground -->
  <g transform="translate(80, 80)">
    <!-- Card Shadow -->
    <rect x="5" y="15" width="260" height="210" rx="20" fill="#16231F" opacity="0.10"/>
    <!-- Card Body -->
    <rect width="260" height="210" rx="20" fill="url(#cardGrad)" stroke="#B9B6AC" stroke-width="2"/>

    <!-- Feedback card header -->
    <g transform="translate(20, 20)">
      <circle cx="20" cy="20" r="20" fill="#1E8E5A"/>
      <!-- Robot face in circle -->
      <rect x="11" y="14" width="18" height="12" rx="3" fill="#ffffff"/>
      <circle cx="16" cy="20" r="2" fill="#1E8E5A"/>
      <circle cx="24" cy="20" r="2" fill="#1E8E5A"/>
      <rect x="18" y="29" width="4" height="2" fill="#ffffff"/>

      <text x="50" y="18" font-family="Arial" font-size="14" font-weight="bold" fill="#16231F">FitSync AI</text>
      <text x="50" y="32" font-family="Arial" font-size="10" fill="#1E8E5A" font-weight="600">WEEKLY ANALYSIS</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="75" x2="240" y2="75" stroke="#B9B6AC" stroke-dasharray="3 3"/>

    <!-- Checklist feedback items -->
    <g transform="translate(20, 95)">
      <!-- Item 1 -->
      <circle cx="10" cy="10" r="8" fill="#1E8E5A"/>
      <path d="M7 10 L9 12 L13 8" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="26" y="14" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F">Consistency: 96%</text>

      <!-- Item 2 -->
      <circle cx="10" cy="35" r="8" fill="#1E8E5A"/>
      <path d="M7 35 L9 37 L13 33" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="26" y="39" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F">Balance: Good (2 strength, 1 run)</text>

      <!-- Recommendation bubble -->
      <g transform="translate(0, 60)">
        <rect width="220" height="40" rx="8" fill="#DEF2E4"/>
        <text x="12" y="17" font-family="Arial" font-size="11" font-weight="bold" fill="#1E8E5A">Advice:</text>
        <text x="12" y="30" font-family="Arial" font-size="10" fill="#16231F">Your training is balanced. Keep up the streak!</text>
      </g>
    </g>
  </g>
</svg>
