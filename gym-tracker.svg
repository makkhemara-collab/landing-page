<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFEDE6"/>
      <stop offset="100%" stop-color="#D9D6CB"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#DEF2E4"/>
    </linearGradient>
  </defs>

  <rect width="500" height="400" fill="url(#bg)"/>

  <!-- Background Gym Details -->
  <!-- Mirror / Window reflection -->
  <rect x="50" y="40" width="180" height="120" fill="#ffffff" opacity="0.4"/>
  <rect x="260" y="40" width="180" height="120" fill="#ffffff" opacity="0.2"/>
  
  <!-- Barbell Rack in Background -->
  <g opacity="0.5" transform="translate(60, 160)">
    <!-- Rack Posts -->
    <rect x="0" y="0" width="15" height="180" fill="#2B3F38"/>
    <rect x="180" y="0" width="15" height="180" fill="#2B3F38"/>
    <!-- Barbell -->
    <rect x="-30" y="20" width="250" height="8" fill="#16231F"/>
    <!-- Weight Plates -->
    <rect x="-15" y="-10" width="15" height="68" rx="2" fill="#1E8E5A"/>
    <rect x="-25" y="0" width="10" height="48" rx="2" fill="#1E8E5A"/>
    <rect x="195" y="-10" width="15" height="68" rx="2" fill="#1E8E5A"/>
    <rect x="210" y="0" width="10" height="48" rx="2" fill="#1E8E5A"/>
  </g>

  <!-- Weight Bench -->
  <g transform="translate(100, 260)">
    <!-- Bench legs -->
    <rect x="30" y="25" width="20" height="70" fill="#2B3F38"/>
    <rect x="220" y="25" width="20" height="70" fill="#2B3F38"/>
    <rect x="10" y="85" width="60" height="10" fill="#16231F"/>
    <rect x="200" y="85" width="60" height="10" fill="#16231F"/>
    
    <!-- Bench pad -->
    <rect x="0" y="0" width="270" height="30" rx="8" fill="#16231F"/>
    <rect x="0" y="0" width="270" height="15" rx="8" fill="#2B3F38"/>
  </g>

  <!-- The Figure sitting on the bench -->
  <g transform="translate(235, 110)">
    
    <!-- Left Leg (Background) -->
    <path d="M-20 150 Q-40 210 -50 250 L-30 250 Q-20 200 -5 170" fill="#16231F" opacity="0.8"/>
    
    <!-- Torso -->
    <path d="M-15 45 C-40 90 -30 130 -10 160 L15 160 C35 130 40 90 15 45 Z" fill="#16231F"/>
    
    <!-- Head -->
    <circle cx="0" cy="15" r="30" fill="#16231F"/>

    <!-- Earbuds wire (subtle detail from the image) -->
    <path d="M-15 35 Q-25 70 -5 100" fill="none" stroke="#B9B6AC" stroke-width="1.5" opacity="0.6"/>

    <!-- Right Leg (Foreground) -->
    <path d="M0 150 Q20 200 35 250 L55 250 Q40 200 20 150 Z" fill="#16231F"/>

    <!-- Sweat Drops -->
    <circle cx="-35" cy="80" r="2.5" fill="#DEF2E4" opacity="0.8"/>
    <circle cx="35" cy="95" r="2" fill="#DEF2E4" opacity="0.8"/>
    <path d="M-40 60 Q-42 65 -40 68 Q-38 65 -40 60" fill="#DEF2E4"/>
    
    <!-- Left Arm (Resting on left knee) -->
    <path d="M-20 50 Q-60 120 -35 200" fill="none" stroke="#16231F" stroke-width="20" stroke-linecap="round"/>
    
    <!-- Right Arm (Foreground, holding phone) -->
    <path d="M20 50 Q50 90 10 130" fill="none" stroke="#2B3F38" stroke-width="22" stroke-linecap="round"/>
    
    <!-- Right Hand Fingers (Behind phone) -->
    <circle cx="-5" cy="140" r="12" fill="#2B3F38"/>

    <!-- Smartwatch -->
    <rect x="15" y="110" width="12" height="16" rx="2" fill="#E3A83B" transform="rotate(-30 15 110)"/>
    <rect x="17" y="112" width="8" height="12" fill="#ffffff" transform="rotate(-30 17 112)"/>

    <!-- Smartphone -->
    <g transform="translate(-40, 125) rotate(-15)">
      <rect x="0" y="0" width="42" height="70" rx="6" fill="#B9B6AC" stroke="#16231F" stroke-width="1.5"/>
      <!-- Glowing Screen -->
      <rect x="3" y="4" width="36" height="62" rx="4" fill="url(#screenGlow)"/>
      
      <!-- Screen UI Content (Chart & Log) -->
      <rect x="6" y="8" width="22" height="6" rx="2" fill="#16231F"/> <!-- Title 'LOG' -->
      
      <!-- Bar Chart on screen -->
      <rect x="8" y="50" width="5" height="10" fill="#E3A83B"/>
      <rect x="15" y="40" width="5" height="20" fill="#1E8E5A"/>
      <rect x="22" y="30" width="5" height="30" fill="#1E8E5A"/>
      <rect x="29" y="45" width="5" height="15" fill="#E3A83B"/>
      
      <!-- List lines -->
      <rect x="6" y="18" width="28" height="3" fill="#B9B6AC"/>
      <rect x="6" y="24" width="20" height="3" fill="#B9B6AC"/>
    </g>

    <!-- Hands overlapping phone (Thumbs in front) -->
    <!-- Right Thumb touching screen -->
    <path d="M5 135 C-5 125 -15 125 -10 135" fill="#2B3F38" stroke="#B9B6AC" stroke-width="1.5"/>
    <circle cx="-8" cy="132" r="4" fill="#2B3F38"/>
  </g>

</svg>
